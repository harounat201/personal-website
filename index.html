// ─── WHEEL SITE ───────────────────────────────────────────────────────────────
function WheelSite() {
  const [activeSection, setActiveSection] = React.useState(null);
  const [activeItem, setActiveItem] = React.useState(0);
  const [animating, setAnimating] = React.useState(false);

  const [isMobile, setIsMobile] = React.useState(() => window.innerWidth <= 700);
  React.useEffect(() => {
    const mq = window.matchMedia('(max-width: 700px)');
    const handler = e => setIsMobile(e.matches);
    mq.addEventListener('change', handler);
    return () => mq.removeEventListener('change', handler);
  }, []);

  // Ring geometry
  const R = 260;
  const STROKE = 3;
  const SIZE = 680;
  const cx = SIZE / 2;
  const cy = SIZE / 2;
  const n = NAV_ITEMS.length;
  const GAP_DEG = 2.5;

  function selectSection(sec) {
    if (sec === activeSection) {
      setActiveSection(null);
      setActiveItem(0);
      return;
    }
    setAnimating(true);
    setTimeout(() => {
      setActiveSection(sec);
      setActiveItem(0);
      setAnimating(false);
    }, 260);
  }

  function selectItem(idx) {
    if (idx === activeItem) return;
    setAnimating(true);
    setTimeout(() => {
      setActiveItem(idx);
      setAnimating(false);
    }, 200);
  }

  const toRad = d => (d * Math.PI) / 180;

  const section = activeSection ? SECTIONS[activeSection] : null;
  const item = section ? section.items[activeItem] : null;

  // Center radius for content area
  const INNER_R = R - 16;
  const FULL_SVG = SIZE + 140;
  const mobileSvgSize = Math.min(window.innerWidth - 16, 800);
  const mobileScale = mobileSvgSize / FULL_SVG;
  const labelFontSize = isMobile ? 8.5 / mobileScale : 10;
  const LABEL_R = R + 25 - labelFontSize * 0.35;

  // Build segments
  const segments = NAV_ITEMS.map((label, i) => {
    const sliceDeg = 360 / n;
    const startDeg = i * sliceDeg - 90 + GAP_DEG / 2;
    const endDeg = startDeg + sliceDeg - GAP_DEG;
    const x1 = cx + R * Math.cos(toRad(startDeg));
    const y1 = cy + R * Math.sin(toRad(startDeg));
    const x2 = cx + R * Math.cos(toRad(endDeg));
    const y2 = cy + R * Math.sin(toRad(endDeg));
    const large = sliceDeg - GAP_DEG > 180 ? 1 : 0;
    const midDeg = (startDeg + endDeg) / 2;
    const tlx1 = cx + LABEL_R * Math.cos(toRad(startDeg));
    const tly1 = cy + LABEL_R * Math.sin(toRad(startDeg));
    const tlx2 = cx + LABEL_R * Math.cos(toRad(endDeg));
    const tly2 = cy + LABEL_R * Math.sin(toRad(endDeg));
    const isActive = activeSection === label;
    const pathId = `arc-label-${i}`;
    const arcPath = `M ${tlx1} ${tly1} A ${LABEL_R} ${LABEL_R} 0 ${large} 1 ${tlx2} ${tly2}`;
    return { label, x1, y1, x2, y2, large, midDeg, isActive, pathId, arcPath };
  });

  return (
    <div style={{
      width: '100%',
      height: isMobile ? 'auto' : '100vh',
      minHeight: isMobile ? '100dvh' : 'unset',
      background: 'oklch(98.8% 0.006 240)',
      display: 'flex', flexDirection: 'column',
      alignItems: 'center',
      justifyContent: isMobile ? 'flex-start' : 'center',
      position: 'relative',
      overflow: isMobile ? 'visible' : 'hidden',
    }}>

      {/* ── Subtle grid ── */}
      <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',opacity:0.03,pointerEvents:'none'}} xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="g" width="44" height="44" patternUnits="userSpaceOnUse">
            <path d="M 44 0 L 0 0 0 44" fill="none" stroke="oklch(30% 0.06 240)" strokeWidth="0.6"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#g)"/>
      </svg>

      {/* ── Top bar ── */}
      <div style={{
        position: isMobile ? 'sticky' : 'absolute', top: 0, left: 0, right: 0,
        height: isMobile ? 'auto' : 56,
        display: 'flex',
        flexDirection: isMobile ? 'column' : 'row',
        alignItems: isMobile ? 'stretch' : 'center',
        justifyContent: isMobile ? 'flex-start' : 'space-between',
        padding: isMobile ? '8px 16px' : '0 36px',
        gap: isMobile ? 0 : 0,
        borderBottom: activeSection ? '1px solid oklch(88% 0.04 240)' : '1px solid transparent',
        transition: 'border-color 0.4s',
        zIndex: 30,
        background: 'oklch(98.8% 0.006 240)',
      }}>
        {/* Links row */}
        <div style={{ display: 'flex', alignItems: 'center', gap: isMobile ? 10 : 14, flexWrap: 'nowrap', padding: isMobile ? '4px 0' : 0 }}>
          {[
            { label: 'Résumé ↗', href: './Harouna_Thiam-Resume copy.pdf' },
            { label: 'LinkedIn ↗', href: 'https://www.linkedin.com/in/harounathiam/', grey: true },
            { label: 'GitHub ↗', href: 'https://github.com/harounat201', grey: true },
          ].map(({ label, href, grey }, i) => (
            <React.Fragment key={label}>
              {i > 0 && <span style={{ color: 'oklch(80% 0.04 240)', fontSize: 11, lineHeight: 1, flexShrink: 0 }}>·</span>}
              <a
                href={href}
                target="_blank"
                rel="noopener noreferrer"
                style={{
                  fontFamily: 'Plus Jakarta Sans', fontWeight: 400, fontSize: 10.5,
                  letterSpacing: '0.14em', textTransform: 'uppercase',
                  color: grey ? 'oklch(65% 0.02 240)' : 'oklch(52% 0.22 250)',
                  textDecoration: 'none',
                  transition: 'color 0.2s',
                  flexShrink: 0,
                }}
                onMouseEnter={e => e.currentTarget.style.color = grey ? 'oklch(40% 0.02 240)' : 'oklch(38% 0.24 250)'}
                onMouseLeave={e => e.currentTarget.style.color = grey ? 'oklch(65% 0.02 240)' : 'oklch(52% 0.22 250)'}
              >{label}</a>
            </React.Fragment>
          ))}
        </div>
      </div>

      {/* ── Wheel + center wrapper ── */}
      <div style={{
        position: isMobile ? 'relative' : 'absolute',
        width: isMobile ? mobileSvgSize : FULL_SVG,
        height: isMobile ? mobileSvgSize : FULL_SVG,
        flexShrink: 0,
        marginTop: isMobile ? 12 : 0,
      }}>

      {/* ── Wheel SVG ── */}
      <svg
        width={isMobile ? mobileSvgSize : FULL_SVG}
        height={isMobile ? mobileSvgSize : FULL_SVG}
        viewBox={`-70 -70 ${FULL_SVG} ${FULL_SVG}`}
        style={{
          position: 'absolute', zIndex: 5,
          animation: 'slowSpin 129s linear infinite',
          transformOrigin: 'center center',
        }}
      >
        <defs>
          {segments.map(({ pathId, arcPath }) => (
            <path key={pathId} id={pathId} d={arcPath} fill="none"/>
          ))}
        </defs>

        {/* Outer ghost ring */}
        <circle cx={cx} cy={cy} r={R + 50} fill="none" stroke="oklch(86% 0.04 240)" strokeWidth="0.5"/>

        {/* Tick marks */}
        {Array.from({ length: 72 }, (_, i) => {
          const angle = (i / 72) * 360 - 90;
          const rad = angle * Math.PI / 180;
          const major = i % 6 === 0;
          const r2 = R + 50;
          const r1 = r2 + (major ? 7 : 3.5);
          return (
            <line key={i}
              x1={cx + r2 * Math.cos(rad)} y1={cy + r2 * Math.sin(rad)}
              x2={cx + r1 * Math.cos(rad)} y2={cy + r1 * Math.sin(rad)}
              stroke="oklch(74% 0.04 240)"
              strokeWidth={major ? 1 : 0.5}
              opacity={0.55}
            />
          );
        })}

        {/* Segments */}
        {segments.map(({ label, x1, y1, x2, y2, large, isActive, pathId }) => (
          <g key={label} style={{ cursor: 'pointer' }} onClick={() => selectSection(label)}>
            {/* Invisible wider hit area */}
            <path
              d={`M ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2}`}
              fill="none" stroke="transparent" strokeWidth={24}

// ─── CHAT WIDGET ──────────────────────────────────────────────────────────────
function ChatWidget() {
  const [open, setOpen] = React.useState(false);
  const [messages, setMessages] = React.useState([
    { role: 'bot', text: 'Ask me anything about Harouna — his work, projects, or background.' }
  ]);
  const [input, setInput] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [msgCount, setMsgCount] = React.useState(0);
  const history = React.useRef([]);
  const bottomRef = React.useRef(null);
  const inputRef = React.useRef(null);
  const MSG_CAP = 10;

  React.useEffect(() => {
    if (open) setTimeout(() => inputRef.current?.focus(), 80);
  }, [open]);

  React.useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages, loading]);

  async function send() {
    const text = input.trim();
    if (!text || loading || msgCount >= MSG_CAP) return;
    setInput('');
    setLoading(true);
    setMsgCount(c => c + 1);
    setMessages(m => [...m, { role: 'user', text }]);
    history.current.push({ role: 'user', content: text });

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: history.current.slice(-6) }),
      });
      const data = await res.json();
      const reply = data.reply || 'Sorry, something went wrong.';
      history.current.push({ role: 'assistant', content: reply });
      setMessages(m => [...m, { role: 'bot', text: reply }]);
      if (msgCount + 1 >= MSG_CAP) {
        setMessages(m => [...m, { role: 'bot', text: 'That\'s the limit for this session — reach Harouna at thiamharouna201@gmail.com.' }]);
      }
    } catch {
      setMessages(m => [...m, { role: 'bot', text: 'Couldn\'t connect. Try again in a moment.' }]);
      setMsgCount(c => c - 1);
    } finally {
      setLoading(false);
    }
  }

  const disabled = loading || msgCount >= MSG_CAP;

  return (
    <div style={{ position: 'fixed', bottom: 24, left: 24, zIndex: 200, display: 'flex', flexDirection: 'column', alignItems: 'flex-start' }}>

      {/* Panel */}
      {open && (
        <div style={{
          marginBottom: 10,
          width: 300,
          maxHeight: 420,
          background: 'oklch(99% 0.004 240)',
          border: '1px solid oklch(88% 0.04 240)',
          borderRadius: 12,
          display: 'flex',
          flexDirection: 'column',
          overflow: 'hidden',
          boxShadow: '0 8px 40px oklch(20% 0.05 240 / 0.10)',
        }}>
          {/* Header */}
          <div style={{
            padding: '12px 16px',
            borderBottom: '1px solid oklch(91% 0.03 240)',
            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          }}>
            <div>
              <div style={{ fontFamily: 'Lora', fontSize: 13, color: 'oklch(20% 0.07 240)' }}>Ask about Harouna</div>
              <div style={{ fontFamily: 'Plus Jakarta Sans', fontWeight: 300, fontSize: 9.5, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'oklch(60% 0.04 240)', marginTop: 2 }}>AI Assistant</div>
            </div>
            <button
              onClick={() => setOpen(false)}
              style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'oklch(60% 0.04 240)', fontSize: 16, lineHeight: 1, padding: 2 }}
            >×</button>
          </div>

          {/* Messages */}
          <div style={{
            flex: 1, overflowY: 'auto', padding: '14px 16px',
            display: 'flex', flexDirection: 'column', gap: 10,
            scrollbarWidth: 'thin', scrollbarColor: 'oklch(84% 0.04 240) transparent',
          }}>
            {messages.map((msg, i) => (
              <div key={i} style={{
                alignSelf: msg.role === 'user' ? 'flex-end' : 'flex-start',
                maxWidth: '84%',
              }}>
                <div style={{
                  fontFamily: 'Plus Jakarta Sans', fontWeight: 300, fontSize: 12.5, lineHeight: 1.6,
                  color: msg.role === 'user' ? 'white' : 'oklch(26% 0.06 240)',
                  background: msg.role === 'user' ? 'oklch(52% 0.22 250)' : 'oklch(94% 0.015 240)',
                  borderRadius: msg.role === 'user' ? '12px 12px 3px 12px' : '12px 12px 12px 3px',
                  padding: '8px 12px',
                }}>{msg.text}</div>
              </div>
            ))}
            {loading && (
              <div style={{ alignSelf: 'flex-start' }}>
                <div style={{
                  background: 'oklch(94% 0.015 240)',
                  borderRadius: '12px 12px 12px 3px',
                  padding: '8px 14px',
                  display: 'flex', gap: 5, alignItems: 'center',
                }}>
                  {[0, 1, 2].map(i => (
                    <div key={i} style={{
                      width: 5, height: 5, borderRadius: '50%',
                      background: 'oklch(66% 0.06 240)',
                      animation: `chatDot 1s ease-in-out ${i * 0.18}s infinite`,
                    }} />
                  ))}
                </div>
              </div>
            )}
            <div ref={bottomRef} />
          </div>

          {/* Input */}
          <div style={{
            borderTop: '1px solid oklch(91% 0.03 240)',
            display: 'flex', alignItems: 'center', gap: 0,
            background: 'oklch(99% 0.004 240)',
          }}>
            <input
              ref={inputRef}
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), send())}
              disabled={disabled}
              placeholder={disabled && msgCount >= MSG_CAP ? 'Session limit reached' : 'Ask a question…'}
              maxLength={300}
              style={{
                flex: 1, border: 'none', outline: 'none', background: 'transparent',
                padding: '11px 14px',
                fontFamily: 'Plus Jakarta Sans', fontWeight: 300, fontSize: 12.5,
                color: 'oklch(26% 0.06 240)',
              }}
            />
            <button
              onClick={send}
              disabled={disabled || !input.trim()}
              style={{
                background: 'none', border: 'none', cursor: disabled || !input.trim() ? 'default' : 'pointer',
                padding: '0 14px',
                color: disabled || !input.trim() ? 'oklch(78% 0.04 240)' : 'oklch(52% 0.22 250)',
                fontSize: 16, transition: 'color 0.2s',
              }}
            >↑</button>
          </div>
        </div>
      )}

      {/* Toggle button */}
      <button
        onClick={() => setOpen(o => !o)}
        style={{
          background: open ? 'oklch(22% 0.08 240)' : 'oklch(99% 0.004 240)',
          border: '1px solid oklch(88% 0.04 240)',
          borderRadius: 20,
          padding: '8px 16px',
          cursor: 'pointer',
          display: 'flex', alignItems: 'center', gap: 7,
          boxShadow: '0 2px 12px oklch(20% 0.05 240 / 0.08)',
          transition: 'background 0.22s, border-color 0.22s',
        }}
        onMouseEnter={e => { if (!open) e.currentTarget.style.borderColor = 'oklch(72% 0.06 240)'; }}
        onMouseLeave={e => { if (!open) e.currentTarget.style.borderColor = 'oklch(88% 0.04 240)'; }}
      >
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
          <path d="M14 1H2C1.45 1 1 1.45 1 2v9c0 .55.45 1 1 1h2v3l3.5-3H14c.55 0 1-.45 1-1V2c0-.55-.45-1-1-1z"
            stroke={open ? 'oklch(88% 0.04 240)' : 'oklch(46% 0.08 240)'} strokeWidth="1.2" fill="none"/>
        </svg>
        <span style={{
          fontFamily: 'Plus Jakarta Sans', fontWeight: 400, fontSize: 10.5,
          letterSpacing: '0.1em', textTransform: 'uppercase',
          color: open ? 'oklch(88% 0.04 240)' : 'oklch(46% 0.08 240)',
        }}>Ask AI</span>
      </button>

      <style>{`
        @keyframes chatDot {
          0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
          30% { transform: translateY(-4px); opacity: 1; }
        }
      `}</style>
    </div>
  );
}

function App() {
  return (
    <>
      <WheelSite />
      <ChatWidget />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
